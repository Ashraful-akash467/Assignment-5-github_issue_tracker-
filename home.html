<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="shortcut icon" href="assets/github-thumb.png" type="image/x-icon">

    <!-- font awesome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     
     <!-- font awesome geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body>
   <div class="min-h-screen bg-[#f3f4f6]">
  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm px-6">
    <div class="navbar-start">
      <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
          </svg>
        </div>
      </div>

      <a class="btn btn-ghost text-xl font-semibold normal-case gap-2">
        <img src="assets/github-thumb.png" alt="" class="w-7 h-7 object-contain">
        GitHub Issues Tracker
      </a>
    </div>

    <div class="navbar-end flex items-center gap-2">
      <input
        type="text"
        placeholder="Search issues..."
        class="input input-bordered w-48 md:w-64 h-10 text-sm bg-white"
      />
      <button class="btn bg-blue-600 text-white hover:bg-blue-700 ml-2 border-none shadow-none">
        <i class="fa-solid fa-plus"></i> New Issue
      </button>
    </div>
  </div>

  <!-- Main Wrapper -->
  <div class="max-w-6xl mx-auto pt-8 px-4">
    
    <!-- Filter Section -->
   <div class="mt-[14px] bg-white border border-gray-200 rounded-lg px-4 py-4 shadow-sm">
  <button id="all" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[72px] hover:bg-blue-100 hover:text-blue-700 transition-colors duration-200">
    All
  </button>
  <button id="open" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[72px] hover:bg-blue-100 hover:text-blue-700 transition-colors duration-200">
    Open
  </button>
  <button id="closed" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[88px] hover:bg-blue-100 hover:text-blue-700 transition-colors duration-200">
    Closed
  </button>
</div>

    <!-- Issues Header -->
    <div class="nav py-6 flex items-center justify-between bg-white border border-gray-200 rounded-lg px-6 mt-4 shadow-sm">
      <div class="flex items-center gap-4 min-w-0">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center shrink-0">
          <i class="fa-solid fa-life-ring text-purple-600 text-lg"></i>
        </div>

        <div class="min-w-0">
          <h2 class="text-2xl font-bold"><span id="issueCount">0</span> Issues</h2>
            <p class="text-gray-500">Track and manage your project issues</p>
        </div>
        
      </div>

      <div class="flex gap-5 shrink-0">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <span class="text-sm text-gray-700">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-purple-500"></span>
          <span class="text-sm text-gray-700">Closed</span>
        </div>
      </div>
    </div>

    <!-- Cards Container -->
    <section id="card" class="mt-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start">
      <!-- Example Card -->
      
    </section>
  </div>
</div>









      <!-- ISSUE MODAL -->
<div id="issueModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

    <div class="bg-white w-[600px] rounded-xl p-6 shadow-lg relative">

        <!-- Title -->
        <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

        <!-- Status -->
        <div class="flex items-center gap-3 mb-4 text-sm text-gray-500">
            <span id="modalStatus" class="px-3 py-1 rounded-full text-white bg-green-500 text-xs"></span>
            <span id="modalAuthor"></span>
            <span id="modalDate"></span>
        </div>

        <!-- Labels -->
        <div id="modalLabels" class="flex gap-2 mb-4 flex-wrap"></div>

        <!-- Description -->
        <p id="modalDescription" class="text-gray-600 mb-6"></p>

        <!-- Assignee + Priority -->
        <div class="bg-gray-100 p-4 rounded-lg flex justify-between">

            <div>
                <p class="text-sm text-gray-500">Assignee</p>
                <p id="modalAssignee" class="font-semibold"></p>
            </div>

            <div>
                <p class="text-sm text-gray-500">Priority</p>
                <span id="modalPriority" class="px-3 py-1 rounded-full text-sm font-semibold"></span>
            </div>

        </div>

        <!-- Close button -->
        <div class="flex justify-end mt-6">
            <button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded-lg">
                Close
            </button>
        </div>

    </div>

</div>
















    <script src="script/script.js"></script>
</body>
</html>
