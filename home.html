<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="shortcut icon" href="assets/github-thumb.png" type="image/x-icon">

    <!-- font awesome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     
     <!-- font awesome geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body>
   <div class="min-h-screen bg-[#f3f4f6]">
  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm px-6">
    <div class="navbar-start">
      <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
          </svg>
        </div>
      </div>

      <a class="btn btn-ghost text-xl font-semibold normal-case gap-2">
        <img src="assets/github-thumb.png" alt="" class="w-7 h-7 object-contain">
        GitHub Issues Tracker
      </a>
    </div>

    <div class="navbar-end flex items-center gap-2">
      <input
        type="text"
        placeholder="Search issues..."
        class="input input-bordered w-48 md:w-64 h-10 text-sm bg-white"
      />
      <button class="btn bg-blue-600 text-white hover:bg-blue-700 ml-2 border-none shadow-none">
        <i class="fa-solid fa-plus"></i> New Issue
      </button>
    </div>
  </div>

  <!-- Main Wrapper -->
  <div class="max-w-6xl mx-auto pt-8 px-4">
    
    <!-- Filter Section -->
    <div class="mt-[14px] bg-white border border-gray-200 rounded-lg px-4 py-4 shadow-sm">
      <button id="all" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[72px]">
        All
      </button>
      <button id="open" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[72px]">
        Open
      </button>
      <button id="closed" class="filter-btn btn bg-white text-gray-500 border border-gray-300 ml-2 rounded-md px-8 min-w-[88px]">
        Closed
      </button>
    </div>

    <!-- Issues Header -->
    <div class="nav py-6 flex items-center justify-between bg-white border border-gray-200 rounded-lg px-6 mt-4 shadow-sm">
      <div class="flex items-center gap-4 min-w-0">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center shrink-0">
          <i class="fa-solid fa-life-ring text-purple-600 text-lg"></i>
        </div>
        <div class="min-w-0">
          <h1 class="text-[24px] font-bold text-gray-800 leading-none">50 Issues</h1>
          <p class="text-sm text-gray-500 mt-1">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-5 shrink-0">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <span class="text-sm text-gray-700">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-purple-500"></span>
          <span class="text-sm text-gray-700">Closed</span>
        </div>
      </div>
    </div>

    <!-- Cards Container -->
    <section id="card" class="mt-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start">
      <!-- Example Card -->
      
    </section>
  </div>
</div>
















<div class="bg-gray-100 flex items-center justify-center min-h-screen">
        <!-- Card -->
  <div class="w-[360px] bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

    <!-- Top green line -->
    <div class="h-1 bg-green-500"></div>

    <!-- Card Body -->
    <div class="p-5">

      <!-- Header Row -->
      <div class="flex items-center justify-between mb-4">

        <!-- Icon -->
        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
          <div class="w-5 h-5 border-2 border-green-500 rounded-full border-dashed"></div>
        </div>

        <!-- Priority -->
        <span class="px-4 py-1 text-sm font-semibold text-red-500 bg-red-100 rounded-full">
          HIGH
        </span>

      </div>

      <!-- Title -->
      <h2 class="text-lg font-semibold text-gray-800 leading-snug mb-2">
        Fix Navigation Menu On Mobile Devices
      </h2>

      <!-- Description -->
      <p class="text-gray-500 text-sm mb-4">
        The navigation menu doesn't collapse properly on mobile devices...
      </p>

      <!-- Tags -->
      <div class="flex gap-3 mb-4">

        <!-- Bug -->
        <span class="flex items-center gap-1 px-3 py-1 text-sm font-medium text-red-500 bg-red-100 rounded-full">
          🐞 BUG
        </span>

        <!-- Help Wanted -->
        <span class="flex items-center gap-1 px-3 py-1 text-sm font-medium text-yellow-600 bg-yellow-100 rounded-full">
          🛟 HELP WANTED
        </span>

      </div>

    </div>

    <!-- Footer -->
    <div class="border-t border-gray-200 px-5 py-3 text-sm text-gray-500">
      <p>#1 by john_doe</p>
      <p>1/15/2024</p>
    </div>

  </div>
    </div>






    <script src="script/script.js"></script>
</body>
</html>
