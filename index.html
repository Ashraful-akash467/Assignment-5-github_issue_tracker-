<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issues-Tracker</title>
    <link rel="shortcut icon" href="assets/github-thumb.png" type="image/x-icon">

    <link rel="stylesheet" href="style/style.css">

    <!-- font awesome geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

<section class="main">
<header class="header">
    <img src="assets/github-logo.png" alt="GitHub Logo">
    <h1>GitHub Issues Tracker</h1>
    <h3>Sign in to manage your issues</h3>
    
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
  
      <label class="label bold">Username</label>
      <input type="text" class="input px-8" id="username" placeholder="Username"/>

      <label class="label bold ">Password</label>
      <input type="password" class="input" id="password" placeholder="Password"/>

      <button class="btn btn-neutral mt-4 g" onclick="login()">Login</button>


    </fieldset>
    <h1 class="or">------------------OR------------------</h1>
    <div class="demo">
        <h2>Demo Credentials:</h2>
        <p><span class="bold">Username:</span> admin<br>
          <span class="bold">Password:</span> admin123</p>
    </div>

</header>
</section>

<script src="script/script.js"></script>

</body>


</html>
